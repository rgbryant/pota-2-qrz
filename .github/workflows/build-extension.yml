name: Build Chrome Extension

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or your preferred version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check line lengths
        run: npm run check-lines

      - name: Build extension
        run: npm run build # Ensure this script exists in your package.json

      - name: Get version
        id: version
        run: |
          BASE=$(jq -r .version dist/manifest.json)
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "version=${BASE}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-6)
            echo "version=${BASE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Zip the build
        run: zip -r extension-v${{ steps.version.outputs.version }}.zip dist/*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-v${{ steps.version.outputs.version }}.zip
          path: extension-v${{ steps.version.outputs.version }}.zip
