name: Build Chrome Extension

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or your preferred version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build # Ensure this script exists in your package.json

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version dist/manifest.json)" >> $GITHUB_OUTPUT

      - name: Zip the build
        run: zip -r extension-v${{ steps.version.outputs.version }}.zip dist/*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-v${{ steps.version.outputs.version }}
          path: extension-v${{ steps.version.outputs.version }}.zip
