<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K4RGB - POTA → QRZ Logger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1e2530;
      color: #e8eaf0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: linear-gradient(90deg, #c0392b 0%, #7b241c 100%);
    }
    .header-icon { font-size: 22px; }
    .header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.03em;
    }
    .header p {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-top: 1px;
    }

    /* Form body */
    .body { padding: 16px; }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #8b95a8;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #2c3444;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 12px;
      font-weight: 600;
      color: #9aa5b8;
    }

    .field input, .field select {
      padding: 8px 10px;
      background: #2c3444;
      border: 1px solid #3d4758;
      border-radius: 6px;
      color: #e8eaf0;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus {
      border-color: #e74c3c;
    }
    .field input::placeholder { color: #4d5a6d; }

    .input-reveal-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-reveal-wrap input {
      flex: 1;
      padding-right: 36px;
    }
    #toggleApiKey {
      position: absolute;
      right: 6px;
      background: none;
      border: none;
      cursor: pointer;
      color: #6a7898;
      padding: 2px;
      display: flex;
      align-items: center;
      border-radius: 3px;
      transition: color 0.15s;
    }
    #toggleApiKey:hover { color: #e8eaf0; }
      font-size: 11px;
      color: #5d6878;
      line-height: 1.4;
    }
    .field-hint a {
      color: #e74c3c;
      text-decoration: none;
    }
    .field-hint a:hover { text-decoration: underline; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Save button */
    .save-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #c0392b 0%, #922b21 100%);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.03em;
      margin-top: 4px;
      transition: opacity 0.15s;
    }
    .save-btn:hover { opacity: 0.88; }

    /* Status */
    #status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    #status.show { display: block; }
    #status.ok   { background: rgba(39,174,96,0.2); color: #2ecc71; border: 1px solid rgba(39,174,96,0.3); }
    #status.err  { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }

    /* Footer */
    .footer {
      padding: 10px 16px;
      background: #171d27;
      border-top: 1px solid #2c3444;
      font-size: 11px;
      color: #5d6878;
      text-align: center;
    }
    .footer a { color: #8b95a8; text-decoration: none; }
    .footer a:hover { color: #e8eaf0; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">📡</div>
    <div>
      <h1>K4RGB - POTA → QRZ Logger</h1>
      <p>Log POTA contacts to QRZ.com</p>
    </div>
  </div>

  <div class="body">
    <div class="section-title">QRZ Configuration</div>

    <div class="field">
      <label for="myCallsign">Your Callsign</label>
      <input id="myCallsign" type="text" placeholder="K0XYZ" maxlength="20" />
    </div>

    <div class="field">
      <label for="qrzApiKey">QRZ Logbook API Key</label>
      <div class="input-reveal-wrap">
        <input id="qrzApiKey" type="password" placeholder="XXXX-XXXX-XXXX-XXXX" />
        <button type="button" id="toggleApiKey" title="Show / hide API key" aria-label="Show API key">
          <svg id="eye-show" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eye-hide" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <span class="field-hint">
        Find your key at
        <a href="https://www.qrz.com/docs/logbook30/api" target="_blank">qrz.com → Logbook → Settings → API Key</a>.
        Requires a QRZ XML subscription.
      </span>
    </div>

    <button class="save-btn" id="saveBtn">Save Settings</button>
    <div id="status"></div>
  </div>

  <div class="footer">
    Not affiliated with POTA or QRZ.com &nbsp;|&nbsp;
    <a href="https://www.qrz.com/docs/logbook/QRZLogbookAPI.html" target="_blank">QRZ API Docs</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
